services:
  db:
    # PostGIS-ready image so the future geo-index upgrade is a migration,
    # not an infra change. Columns are plain lat/lng floats for now.
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: medsalert
      POSTGRES_PASSWORD: medsalert
      POSTGRES_DB: medsalert
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medsalert"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://medsalert:medsalert@db:5432/medsalert
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
