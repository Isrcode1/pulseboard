name: CI — PulseBoard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint — auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Run ruff linter
        run: ruff check app/

  test:
    name: Test — auth-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://pulseboard:pulseboard@localhost:5432/pulseboard
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          JWT_SECRET_KEY: test-secret-key
          GITHUB_REDIRECT_URI: http://localhost:8001/auth/github/callback

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: false
          tags: pulseboard-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
