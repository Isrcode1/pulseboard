version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: pb-postgres
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: pulseboard
      POSTGRES_DB: pulseboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [pb-network]

  redis:
    image: redis:7-alpine
    container_name: pb-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
    networks: [pb-network]

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: pb-auth
    environment:
      DATABASE_URL: postgresql+asyncpg://pulseboard:pulseboard@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379/0
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost/api/auth/auth/github/callback}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key}
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [pb-network]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pb-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      auth-service:
        condition: service_healthy
    networks: [pb-network]
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pb-network:
    driver: bridge
